
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ-Intelligenztest (Deutsch) – Premium 2025</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#4f46e5;--pri2:#7c3aed;--bg:#0f172a;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--green:#22c55e;--red:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
/* LANDING */
.landing{text-align:center;max-width:760px;animation:fadeUp .6s ease}
.landing h1{font-size:2.7rem;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;font-weight:800;letter-spacing:-1px}
.landing .sub{color:#94a3b8;font-size:1.1rem;margin-bottom:32px}
.landing .desc{color:#cbd5e1;font-size:.95rem;line-height:1.75;margin-bottom:28px;text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:22px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.info-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 14px}
.info-card .num{font-size:1.7rem;font-weight:700;color:#818cf8}
.info-card .lbl{color:#94a3b8;font-size:.82rem;margin-top:4px}
.cats{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:28px}
.cat-tag{padding:7px 16px;border-radius:100px;font-size:.82rem;border:1px solid;font-weight:500}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;border-radius:14px;border:none;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;box-shadow:0 4px 24px rgba(79,70,229,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,70,229,.45)}
.btn-secondary{background:rgba(255,255,255,.06);color:#cbd5e1;border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.btn-icon{padding:8px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#94a3b8;cursor:pointer;font-size:.9rem;transition:all .2s;display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-weight:500}
.btn-icon:hover{background:rgba(255,255,255,.1);color:#e2e8f0;border-color:rgba(255,255,255,.2)}
.btn-icon.flagged{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.45);color:#fb923c}
/* NAME/CONTINUE */
.name-screen,.continue-screen{text-align:center;max-width:480px;animation:fadeUp .5s ease}
.name-screen h2,.continue-screen h2{font-size:1.9rem;color:#e2e8f0;font-weight:700;margin-bottom:8px}
.name-screen p,.continue-screen p{color:#94a3b8;margin-bottom:24px;line-height:1.6;font-size:.95rem}
.name-input{width:100%;padding:15px 20px;border-radius:14px;border:2px solid rgba(129,140,248,.3);background:rgba(255,255,255,.06);color:#e2e8f0;font-size:1.1rem;outline:none;transition:border-color .2s;margin-bottom:18px}
.name-input:focus{border-color:rgba(129,140,248,.7)}
.name-input::placeholder{color:#475569}
.saves-list{margin-top:20px;text-align:left}
.saves-list h4{color:#64748b;font-size:.78rem;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.save-item{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .2s}
.save-item:hover{background:rgba(129,140,248,.1)}
.save-item .save-name{color:#c7d2fe;font-weight:600;font-size:.93rem}
.save-item .save-meta{color:#64748b;font-size:.78rem}
.ci-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:18px;margin:16px 0;text-align:left}
.ci-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);color:#cbd5e1;font-size:.92rem}
.ci-row:last-child{border-bottom:none}
.ci-val{color:#a5b4fc;font-weight:600}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
/* TEST */
.test-container{width:100%;max-width:820px;animation:fadeUp .35s ease}
.progress-bar{background:rgba(255,255,255,.08);border-radius:100px;height:6px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));border-radius:100px;transition:width .5s ease}
.test-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.test-header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.test-header-right{display:flex;align-items:center;gap:8px}
.q-counter{color:#94a3b8;font-size:.87rem}
.q-cat{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:100px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.q-cat[data-cat="M"]{background:rgba(59,130,246,.15);color:#60a5fa}
.q-cat[data-cat="Z"]{background:rgba(34,197,94,.15);color:#4ade80}
.q-cat[data-cat="L"]{background:rgba(249,115,22,.15);color:#fb923c}
.q-cat[data-cat="R"]{background:rgba(236,72,153,.15);color:#f472b6}
.q-cat[data-cat="V"]{background:rgba(139,92,246,.15);color:#c4b5fd}
.diff-stars{font-size:.7rem;letter-spacing:1px}
.timer{color:#94a3b8;font-size:.82rem;font-variant-numeric:tabular-nums}
.q-card{background:var(--card);border-radius:20px;padding:30px;box-shadow:0 4px 40px rgba(0,0,0,.28);margin-bottom:14px}
.q-title{font-size:1.08rem;font-weight:600;margin-bottom:20px;color:var(--text);line-height:1.55}
.q-visual{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:22px;padding:18px;background:#f8fafc;border-radius:14px}
.cell{display:inline-flex;align-items:center;justify-content:center;flex-wrap:wrap;width:66px;height:66px;background:#fff;border:2px solid var(--border);border-radius:10px;gap:2px;padding:4px}
.cell-missing{border:2px dashed #cbd5e1;background:#f1f5f9;font-size:1.4rem;font-weight:700;color:#94a3b8}
.matrix-grid{display:inline-grid;gap:6px;padding:14px;background:#f8fafc;border-radius:14px}
.matrix-3{grid-template-columns:repeat(3,66px)}
.opts-grid{display:grid;gap:9px}
.opts-4{grid-template-columns:repeat(2,1fr)}
.opts-2{grid-template-columns:1fr}
.opt-btn{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;text-align:left;font-size:.96rem;color:var(--text);width:100%}
.opt-btn:hover{border-color:#a5b4fc;background:#f5f3ff}
.opt-btn.selected{border-color:var(--pri);background:#eef2ff;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.opt-label{width:26px;height:26px;border-radius:7px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:var(--muted);flex-shrink:0;transition:all .2s}
.opt-btn.selected .opt-label{background:var(--pri);color:#fff}
.opt-content{flex:1;line-height:1.4}
.shape{line-height:1}
/* ANALOGY */
.analogy-display{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:22px;padding:22px 18px;background:linear-gradient(135deg,#f8faff,#f3f0ff);border-radius:16px;border:2px solid #e8edff}
.analogy-word{font-weight:700;color:#1e293b;padding:10px 18px;background:#fff;border:2px solid #dde4ff;border-radius:12px;font-size:1rem;box-shadow:0 2px 8px rgba(79,70,229,.08)}
.analogy-sep{color:#94a3b8;font-size:1.4rem;font-weight:300;user-select:none}
.analogy-eq{color:#6366f1;font-size:1.1rem;font-weight:600;padding:0 6px}
.analogy-blank{font-weight:800;color:#4f46e5;padding:10px 26px;background:linear-gradient(135deg,#eef2ff,#f5f0ff);border:2px dashed #818cf8;border-radius:12px;font-size:1.1rem;letter-spacing:3px}
/* SEQ DISPLAY */
.seq-display{font-size:1.3rem;font-weight:700;text-align:center;padding:15px;background:#f8fafc;border-radius:12px;letter-spacing:3px;color:#1e293b;margin-top:12px}
/* NAV ROW */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;flex-wrap:wrap}
.nav-left{display:flex;align-items:center;gap:8px}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.88);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay-card{background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:36px;text-align:center;max-width:400px;width:100%}
.overlay-card h2{font-size:1.8rem;color:#e2e8f0;margin-bottom:8px}
.overlay-card p{color:#94a3b8;margin-bottom:24px;line-height:1.6;font-size:.94rem}
.overlay-card .btn-col{display:flex;flex-direction:column;gap:10px;align-items:center}
/* OVERVIEW */
.overview-card{background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto}
.overview-card h3{color:#e2e8f0;font-size:1.15rem;font-weight:700;margin-bottom:4px}
.ov-sub{color:#64748b;font-size:.82rem;margin-bottom:20px}
.q-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:16px}
.q-dot{width:100%;aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent;position:relative}
.q-dot:hover{transform:scale(1.12);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.q-dot.unanswered{background:rgba(255,255,255,.07);color:#64748b;border-color:rgba(255,255,255,.08)}
.q-dot.answered{color:#fff}
.q-dot.flagged{border-color:#f97316 !important}
.q-dot.flagged::after{content:'🚩';position:absolute;top:-7px;right:-7px;font-size:.55rem;line-height:1}
.q-dot.current{outline:3px solid #fff;outline-offset:2px}
.ov-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.ov-leg{display:flex;align-items:center;gap:6px;color:#94a3b8;font-size:.78rem}
.ov-leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
/* RESULTS */
.results{text-align:center;max-width:820px;animation:fadeUp .6s ease;width:100%}
.iq-display{margin-bottom:10px}
.iq-score{font-size:5rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.iq-label{color:#94a3b8;font-size:.92rem;margin-top:4px}
.classification{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.percentile{color:#94a3b8;font-size:.9rem;margin-bottom:20px}
.res-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:18px}
.res-card h3{color:#e2e8f0;font-size:.93rem;font-weight:700;margin-bottom:14px;text-align:center}
.cat-row{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.cat-name{width:150px;color:#cbd5e1;font-size:.85rem;flex-shrink:0}
.cat-bar-bg{flex:1;height:9px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:100px;transition:width 1.3s ease}
.cat-pct{width:42px;text-align:right;color:#94a3b8;font-size:.82rem;font-weight:600}
.cat-tip{color:#94a3b8;font-size:.77rem;margin-top:-6px;margin-bottom:10px;margin-left:161px;font-style:italic;line-height:1.5;padding-right:55px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.detail-item{text-align:center;background:rgba(255,255,255,.03);border-radius:10px;padding:12px 8px}
.detail-val{font-size:1.2rem;font-weight:700;color:#a5b4fc}
.detail-lbl{color:#94a3b8;font-size:.73rem;margin-top:3px}
/* WRONG ANSWERS */
.wrong-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:15px;margin-bottom:12px}
.wrong-item:last-child{margin-bottom:0}
.wrong-header{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.wrong-num{background:rgba(239,68,68,.15);color:#fca5a5;padding:3px 10px;border-radius:100px;font-size:.74rem;font-weight:700}
.wrong-cat-badge{padding:3px 10px;border-radius:100px;font-size:.71rem;font-weight:600}
.wrong-diff{color:#64748b;font-size:.74rem}
.wrong-title{color:#e2e8f0;font-size:.87rem;font-weight:500;line-height:1.4;margin-bottom:8px}
.wrong-analogy{color:#94a3b8;font-size:.78rem;font-style:italic;margin-bottom:8px;padding:6px 10px;background:rgba(139,92,246,.08);border-radius:7px;display:inline-block}
.wrong-ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.ans-box{padding:9px 12px;border-radius:9px;font-size:.83rem}
.ans-box.usr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.ans-box.cor{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac}
.ans-box .al{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;opacity:.7;margin-bottom:3px}
.expl{background:rgba(129,140,248,.07);border-left:3px solid rgba(129,140,248,.4);padding:10px 13px;border-radius:0 8px 8px 0;color:#c7d2fe;font-size:.82rem;line-height:1.65}
/* MOTIVATIONAL BANNER */
.motiv-banner{padding:16px 20px;border-radius:14px;margin-bottom:18px;text-align:left;border:1px solid}
.motiv-banner .mb-title{font-size:1.02rem;font-weight:700;margin-bottom:5px}
.motiv-banner .mb-text{font-size:.87rem;line-height:1.6;opacity:.88}
/* SHARE ROW */
.share-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.share-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#cbd5e1;cursor:pointer;font-size:.88rem;font-weight:500;transition:all .2s;font-family:inherit}
.share-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28)}
.share-btn.copied{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.4);color:#4ade80}
/* IQ RANGE TABLE */
.iq-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
.iq-table th{color:#64748b;font-weight:600;text-align:left;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.iq-table td{padding:7px 10px;color:#cbd5e1;border-bottom:1px solid rgba(255,255,255,.04)}
.iq-table tr.current-row td{font-weight:700;color:#a5b4fc}
.iq-table tr:last-child td{border-bottom:none}
/* DISCLAIMER */
.disclaimer{color:#64748b;font-size:.75rem;line-height:1.65;margin-top:14px;padding:14px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.05);text-align:left}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:#1e293b;border:1px solid rgba(129,140,248,.4);color:#c7d2fe;padding:11px 22px;border-radius:12px;font-size:.88rem;font-weight:500;z-index:10000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
/* CONFETTI */
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
/* PRINT */
@media print{
  body{background:#fff !important}
  #confettiCanvas,.toast,#app>*:not(.results){display:none}
  .results>*:not(.print-cert){display:none !important}
  .print-cert{display:block !important;border:4px solid #4f46e5;border-radius:12px;padding:48px;text-align:center;color:#000}
  .print-cert h1{font-size:2.2rem;margin-bottom:6px;color:#1e293b}
  .print-cert .pc-iq{font-size:4rem;font-weight:800;color:#4f46e5;margin:16px 0}
  .print-cert .pc-meta{font-size:1rem;color:#475569;line-height:1.8}
  .print-cert .pc-dis{font-size:.72rem;color:#94a3b8;margin-top:20px;line-height:1.6}
}
.print-cert{display:none}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
/* RESPONSIVE */
@media(max-width:600px){
  .landing h1{font-size:2rem}
  .info-grid{grid-template-columns:1fr}
  .q-card{padding:16px}
  .cell{width:52px;height:52px}
  .matrix-3{grid-template-columns:repeat(3,52px)}
  .opts-4{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr 1fr}
  .iq-score{font-size:3.5rem}
  .wrong-ans-grid{grid-template-columns:1fr}
  .q-grid{grid-template-columns:repeat(6,1fr)}
  .analogy-display{gap:6px;padding:14px 10px}
  .analogy-word{padding:8px 12px;font-size:.9rem}
  .analogy-blank{padding:8px 16px}
  .test-header{flex-direction:column;align-items:flex-start}
  .nav-row{flex-direction:column-reverse;gap:10px}
  .nav-left,.nav-right{width:100%;justify-content:space-between}
  .cat-tip{margin-left:0;padding-right:0}
}
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
/* ===================== SHAPES & COLORS ===================== */
const SH={c:['●','○'],s:['■','□'],t:['▲','△'],d:['◆','◇'],st:['★','☆']};
const C={B:'#3b82f6',R:'#ef4444',G:'#22c55e',P:'#a855f7',O:'#f97316',T:'#14b8a6'};
function sh(t,c,f,sz){return{t:t||'c',c:c||C.B,f:f!==false,sz:sz||34};}

/* ===================== CATEGORIES ===================== */
const KAT={
  M:{name:'Mustererkennung',col:'#3b82f6',icon:'🔷'},
  Z:{name:'Numerisches Denken',col:'#22c55e',icon:'🔢'},
  L:{name:'Logisches Denken',col:'#f97316',icon:'🧩'},
  R:{name:'Räumliches Denken',col:'#ec4899',icon:'📐'},
  V:{name:'Verbale Analogien',col:'#8b5cf6',icon:'💬'}
};

/* ===================== QUESTIONS (48) ===================== */
const FRAGEN=[
/* ─── MUSTERERKENNUNG (8) ─── */
{cat:'M',diff:1,type:'seq',title:'Welche Form kommt als Nächstes?',
 seq:[[sh('c')],[sh('s')],[sh('t')],[sh('c')],[sh('s')]],
 opts:[[sh('d')],[sh('t')],[sh('c')],[sh('st')]],ans:1,
 expl:'Das Muster ●→■→▲ wiederholt sich zyklisch. Nach ● und ■ folgt zwingend ▲.'},

{cat:'M',diff:1,type:'seq',title:'Die Anzahl der Punkte wächst um 1. Welches Element folgt?',
 seq:[[sh('c',C.B,true,18)],
      [sh('c',C.B,true,18),sh('c',C.B,true,18)],
      [sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18)],
      [sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18)]],
 opts:[[sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18)],
       [sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18)],
       [sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18),sh('c',C.B,true,18)],
       [sh('c',C.B,true,18),sh('c',C.B,true,18)]],ans:0,
 expl:'Arithmetische Folge +1 Punkt: 1→2→3→4→5.'},

{cat:'L',diff:1,type:'text',title:'Ist dieser deduktive Schluss logisch gültig?',

 expl:'Gültiger Syllogismus (Barbara): Hunde ⊆ Tiere, Tiere ⊆ {Wasserbedarf} → Hunde ⊆ {Wasserbedarf}. Die Schlussfolgerung folgt zwingend.'},

{cat:'L',diff:2,type:'text',title:'Erkenne den logischen Fehlschluss:',

{cat:'L',diff:2,type:'text',title:'Ist dieser Syllogismus logisch gültig?',

 expl:'Fehler des „undistributed middle": Der Mittelbegriff „schwarz" muss nicht dieselben Objekte abdecken – die Schnittmenge schwarzer Katzen und schwarzer Hüte kann leer sein.'},

{cat:'L',diff:3,type:'text',title:'Ordne die Personen der Größe nach:',

{cat:'L',diff:3,type:'text',title:'Ziehe die logische Schlussfolgerung (Modus Tollens):',

 opts:['Box A','Box B','Box C','Unbestimmbar'],ans:1,

{cat:'L',diff:3,type:'text',title:'Ritter-und-Schurken-Rätsel:',

 expl:'Wenn A ein Ritter wäre, wäre „Wir sind beide Schurken" wahr → Widerspruch (A wäre dann Schurke). Also A = Schurke. A lügt → nicht beide Schurken → B = Ritter.'},

 opts:['Blau','Grün','Gelb','Unbestimmbar'],ans:0,

      qi:state.qi,answers:[...state.answers],flagged:[...state.flagged],
      akkumZeit:elapsed,savedAt:new Date().toISOString(),name:state.userName
    }));
  }catch(e){}
}
function loadProgress(n){try{const d=localStorage.getItem(storageKey(n));return d?JSON.parse(d):null;}catch(e){return null;}}
function clearProgress(n){try{localStorage.removeItem(storageKey(n));}catch(e){}}
function getAllSaves(){
  const s=[];
  try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('iqtest_v5_')){const d=JSON.parse(localStorage.getItem(k));if(d)s.push(d);}}}catch(e){}

}

function cellDiv(shapes,sz=66){
  if(!shapes)return`<div class="cell cell-missing" style="width:${sz}px;height:${sz}px">?</div>`;
  return`<div class="cell" style="width:${sz}px;height:${sz}px">${shapes.map(s=>shapeSpan(s)).join('')}</div>`;

function renderSeq(seq){
  let h='<div class="q-visual">';

function renderMat(grid){
  let h='<div class="q-visual"><div class="matrix-grid matrix-3">';
  grid.forEach(r=>r.forEach(c=>{h+=cellDiv(c);}));

function renderAnalogy(q){

function renderOpts(q){

}

/* ===================== CONFETTI ===================== */
function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  if(!canvas)return;
  canvas.width=innerWidth;canvas.height=innerHeight;
  const ctx=canvas.getContext('2d');
  const cols=['#818cf8','#c084fc','#f0abfc','#4ade80','#fbbf24','#f472b6','#34d399'];
  const pts=Array.from({length:140},()=>({
    x:Math.random()*canvas.width,y:-20-Math.random()*200,
    w:7+Math.random()*8,h:4+Math.random()*6,
    col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360,
    vx:(Math.random()-.5)*3,vy:2+Math.random()*3,vr:(Math.random()-.5)*8
  }));
  let fr=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pts.forEach(p=>{
      if(p.y<canvas.height+20){alive=true;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.04;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.col;ctx.globalAlpha=Math.max(0,1-p.y/canvas.height);
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}
    });
    if(alive&&fr++<240)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ===================== PROBIT / MATH ===================== */
function probit(p){
  const a1=-3.969683028665376e1,a2=2.209460984245205e2,a3=-2.759285104469687e2,a4=1.383577518672690e2,a5=-3.066479806614716e1,a6=2.506628277459239e0;
  const b1=-5.447609879822406e1,b2=1.615858368580409e2,b3=-1.556989798598866e2,b4=6.680131188771972e1,b5=-1.328068155288572e1;
  const c1=-7.784894002430293e-3,c2=-3.223964580411365e-1,c3=-2.400758277161838e0,c4=-2.549732539343734e0,c5=4.374664141464968e0,c6=2.938163982698783e0;
  const d1=7.784695709041462e-3,d2=3.224671290700398e-1,d3=2.445134137142996e0,d4=3.754408661907416e0;
  const pL=0.02425,pH=1-pL;let q,r;
  if(p<pL){q=Math.sqrt(-2*Math.log(p));return(((((c1*q+c2)*q+c3)*q+c4)*q+c5)*q+c6)/((((d1*q+d2)*q+d3)*q+d4)*q+1);}
  else if(p<=pH){q=p-0.5;r=q*q;return(((((a1*r+a2)*r+a3)*r+a4)*r+a5)*r+a6)*q/(((((b1*r+b2)*r+b3)*r+b4)*r+b5)*r+1);}
  else{q=Math.sqrt(-2*Math.log(1-p));return-(((((c1*q+c2)*q+c3)*q+c4)*q+c5)*q+c6)/((((d1*q+d2)*q+d3)*q+d4)*q+1);}
}
function erf(x){const t=1/(1+0.3275911*Math.abs(x));const p=t*(0.254829592+t*(-0.284496736+t*(1.421413741+t*(-1.453152027+t*1.061405429))));const r=1-p*Math.exp(-x*x);return x>=0?r:-r;}
function normalPDF(x,mu=100,sig=15){const z=(x-mu)/sig;return Math.exp(-.5*z*z)/(sig*Math.sqrt(2*Math.PI));}

/* ===================== SCORING ===================== */
function berechneErgebnis(){
  let gew=0,maxG=0;
  const kat={};Object.keys(KAT).forEach(k=>{kat[k]={g:0,m:0};});
  let richtig=0;
  FRAGEN.forEach((q,i)=>{
    const w=q.diff;maxG+=w;kat[q.cat].m+=w;
    if(state.answers[i]===q.ans){gew+=w;kat[q.cat].g+=w;richtig++;}
  });
  const pct=gew/maxG,cl=Math.max(0.02,Math.min(0.98,pct));
  const z=(probit(cl)+0.05)*1.0;
  let iq=Math.round(100+15*z);
  const avgZ=state.gesamtZeit/FRAGEN.length;
  const spAdj=Math.max(-2,Math.min(2,(35-avgZ)/12));
  iq=Math.round(iq+spAdj);iq=Math.max(55,Math.min(145,iq));
  const fz=(iq-100)/15;
  const perc=Math.min(99.9,Math.max(0.1,(0.5*(1+erf(fz/Math.sqrt(2))))*100));
  let label,farbe;
  if(iq<70){label='Sehr niedrig';farbe='#ef4444';}
  else if(iq<80){label='Unterdurchschnittlich';farbe='#f97316';}
  else if(iq<90){label='Leicht unterdurchschnittlich';farbe='#eab308';}
  else if(iq<110){label='Durchschnittlich';farbe='#22c55e';}
  else if(iq<120){label='Überdurchschnittlich';farbe='#3b82f6';}
  else if(iq<130){label='Hochbegabt';farbe='#6366f1';}
  else if(iq<140){label='Sehr hochbegabt';farbe='#8b5cf6';}
  else{label='Außergewöhnlich';farbe='#d946ef';}
  const falsch=[];
  FRAGEN.forEach((q,i)=>{if(state.answers[i]!==q.ans)falsch.push({i,q,got:state.answers[i]});});
  return{iq,perc:perc.toFixed(1),label,farbe,richtig,pct:(pct*100).toFixed(1),kat,avgZ:avgZ.toFixed(1),gZ:state.gesamtZeit,spAdj:spAdj.toFixed(1),gew,maxG,falsch};
}

/* ===================== CATEGORY TIPS ===================== */
function getCatTip(cat,p){
  if(p>=80)return null;
  const t={
    M:'💡 Tipp: Trainiere Mustererkennung mit Raven-Matrices oder Sudoku-Rätseln.',
    Z:'💡 Tipp: Übe Zahlenfolgen täglich – viele Apps bieten kurze Trainingseinheiten.',
    L:'💡 Tipp: Syllogismus-Übungen und Logikrätsel stärken das deduktive Denken.',
    R:'💡 Tipp: 3D-Puzzle, Origami oder mentale Rotationsübungen verbessern räumliches Denken.',
    V:'💡 Tipp: Lesen, Kreuzworträtsel und Analogie-Übungen stärken verbale Intelligenz.'
  };
  return t[cat];
}

/* ===================== RESULTS ===================== */

  // Category bars + tips
  let katB='';
  Object.entries(r.kat).forEach(([k,sc])=>{
    const p=sc.m>0?Math.round(sc.g/sc.m*100):0;

  const ranges=[

    {min:90,max:109,lbl:'Durchschnittlich',pct:'50%'},
    {min:80,max:89,lbl:'Unterdurchschnittlich',pct:'16%'},
    {min:55,max:79,lbl:'Weit unterdurchschnittlich',pct:'9%'},

  }).join('');

  // Wrong answers
  const lbl=['A','B','C','D','E','F'];
  const falschHTML=r.falsch.length===0?
    `<div style="text-align:center;padding:20px;color:#4ade80;font-size:1rem">✅ Hervorragend! Alle Fragen richtig beantwortet.</div>`:
    r.falsch.map(({i,q,got})=>{
      const isVis=q.type!=='text'&&q.type!=='analogy';
      const gText=got===-1?'(Keine Antwort)':(isVis?`Option ${lbl[got]||'?'}`:q.opts[got]||'–');
      const cText=isVis?`Option ${lbl[q.ans]}`:(q.opts[q.ans]||'–');
      const kc=KAT[q.cat]?.col||'#94a3b8';
      const analogyHint=q.type==='analogy'?`<div class="wrong-analogy">${q.analogy[0]} : ${q.analogy[1]} = ${q.analogy[2]} : ?</div>`:'';
      return`<div class="wrong-item">
        <div class="wrong-header">
          <span class="wrong-num">❌ Frage ${i+1}</span>
          <span class="wrong-cat-badge" style="background:${kc}22;color:${kc};border:1px solid ${kc}44">${KAT[q.cat]?.icon} ${KAT[q.cat]?.name}</span>
          <span class="wrong-diff" style="color:#f59e0b">${'★'.repeat(q.diff)}${'☆'.repeat(5-q.diff)}</span>
        </div>
        ${analogyHint}
        <div class="wrong-title">${q.title}</div>
        <div class="wrong-ans-grid">
          <div class="ans-box usr"><div class="al">✗ Deine Antwort</div><div>${gText}</div></div>
          <div class="ans-box cor"><div class="al">✓ Richtige Antwort</div><div>${cText}</div></div>
        </div>
        ${q.expl?`<div class="expl">💡 ${q.expl}</div>`:''}
      </div>`;
    }).join('');

  app.innerHTML=`<div class="results">
  <!-- PRINT CERTIFICATE -->
  <div class="print-cert">
    <h1>🧠 IQ-Intelligenztest – Zertifikat</h1>
    <div class="pc-meta">Ausgestellt für: <b>${state.userName}</b> · Datum: ${new Date().toLocaleDateString('de-DE')}</div>
    <div class="pc-iq">${r.iq}</div>
    <div class="pc-meta"><b>${r.label}</b><br>Perzentil: ${r.perc}% · Richtige Antworten: ${r.richtig}/${FRAGEN.length}<br>Gesamtzeit: ${gm}:${String(gs).padStart(2,'0')} Min</div>
    <div class="pc-dis">Informelles Schätzverfahren, kein klinisch normierter IQ-Test (WAIS-IV, Stanford-Binet). Abweichung ±8–12 Punkte möglich.</div>
  </div>

  <!-- IQ SCORE -->
  <div class="iq-display">
    <div class="iq-score" id="iqNum">0</div>
    <div class="iq-label">Geschätzter IQ-Wert · ${state.userName}</div>
  </div>
  <div class="classification" style="color:${r.farbe}">${r.label}</div>
  <div class="percentile">Perzentil ${r.perc} % — Besser als ca. ${r.perc}% der Allgemeinbevölkerung</div>

  <!-- MOTIVATIONAL BANNER -->
  <div class="motiv-banner" style="background:${motiv.bg};border-color:${motiv.border}">
    <div class="mb-title" style="color:${r.farbe}">${motiv.title}</div>
    <div class="mb-text" style="color:#cbd5e1">${motiv.text}</div>
  </div>

  <!-- SHARE ROW -->
  <div class="share-row">
    <button class="share-btn" id="shareBtn" onclick="shareErgebnis(${r.iq},'${r.perc}','${r.label}')">📋 Ergebnis kopieren</button>
    <button class="share-btn" onclick="window.print()">🖨️ Zertifikat drucken</button>
    <button class="share-btn" onclick="starteTest(true)">🔄 Test wiederholen</button>
  </div>

  <!-- BELL CURVE -->
  <div class="res-card"><h3>Normalverteilung – Deine Position</h3><div id="bellCurve"></div></div>

  <!-- CATEGORIES -->
  <div class="res-card"><h3>Kategorie-Auswertung</h3>${katB}</div>

  <!-- STATS -->
  <div class="res-card"><h3>Teststatistik</h3>
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-val">${r.richtig}/${FRAGEN.length}</div><div class="detail-lbl">Richtige Antworten</div></div>
      <div class="detail-item"><div class="detail-val">${r.pct}%</div><div class="detail-lbl">Gew. Punktzahl</div></div>
      <div class="detail-item"><div class="detail-val">${gm}:${String(gs).padStart(2,'0')}</div><div class="detail-lbl">Gesamtzeit</div></div>
      <div class="detail-item"><div class="detail-val">${r.avgZ}s</div><div class="detail-lbl">Ø Sek. pro Frage</div></div>
      <div class="detail-item"><div class="detail-val">${r.spAdj>0?'+':''}${r.spAdj}</div><div class="detail-lbl">Tempo-Bonus</div></div>
      <div class="detail-item"><div class="detail-val">${r.gew}/${r.maxG}</div><div class="detail-lbl">Gew. Punkte</div></div>
    </div>
  </div>

  <!-- IQ TABLE -->
  <div class="res-card"><h3>IQ-Klassifikationsübersicht (Wechsler-Skala)</h3>
    <table class="iq-table"><thead><tr><th>IQ-Bereich</th><th>Klassifikation</th><th>Bevölkerungsanteil</th></tr></thead>
    <tbody>${tblRows}</tbody></table>
  </div>

  <!-- WRONG ANSWERS -->
  <div class="res-card" style="text-align:left">
    <h3 style="text-align:center">❌ Falsche Antworten ${r.falsch.length>0?`(${r.falsch.length} von ${FRAGEN.length})`:''}</h3>
    ${falschHTML}
  </div>

  <!-- DISCLAIMER -->
  <div class="disclaimer"><b>Wissenschaftlicher Hinweis:</b> Dies ist eine informelle IQ-Schätzung, kein klinisch normierter Test. Der Test prüft ausschließlich kognitiv-universelle Fähigkeiten (Mustererkennung, Logik, Numerik, Raumvorstellung, Sprachkompetenz) – kein Spezialwissen erforderlich. Klinisch anerkannte Tests (WAIS-IV, Stanford-Binet 5, Raven APM) werden von Fachpsychologen unter standardisierten Bedingungen durchgeführt. Diese Schätzung kann um ±8–12 IQ-Punkte von einer klinischen Messung abweichen.</div>

  <div class="btn-row" style="margin-top:18px">
    <button class="btn btn-primary" onclick="starteTest(true)">🔄 Test wiederholen</button>
    <button class="btn btn-secondary" onclick="zeigeLanding()">← Startseite</button>
  </div>
</div>`;

  animiereZaehler(r.iq);
  setTimeout(()=>{
    drawBell(r.iq);
    document.querySelectorAll('.cat-bar-fill').forEach(el=>{el.style.width=el.dataset.w+'%';});
  },400);
  if(r.iq>=120)setTimeout(launchConfetti,800);
}

/* ===================== SHARE ===================== */
window.shareErgebnis=function(iq,perc,label){
  const txt=`🧠 Mein IQ-Testergebnis: ${iq} (${label})\n📊 Perzentil: ${perc}%\n📝 Getestet mit dem deutschen Online-IQ-Test`;
  if(navigator.share){navigator.share({title:'Mein IQ-Ergebnis',text:txt}).catch(()=>{});}
  else{
    navigator.clipboard.writeText(txt).then(()=>{
      showToast('✓ Ergebnis in Zwischenablage kopiert!');
      const btn=document.getElementById('shareBtn');
      if(btn){btn.className='share-btn copied';setTimeout(()=>{btn.className='share-btn';},3000);}
    }).catch(()=>showToast('Kopieren nicht unterstützt'));
  }
};

/* ===================== BELL CURVE ===================== */
function animiereZaehler(ziel){
  const el=document.getElementById('iqNum');const dur=1600,von=55,start=Date.now();
  function tick(){const t=Math.min(1,(Date.now()-start)/dur);const e=1-Math.pow(1-t,3);el.textContent=Math.round(von+(ziel-von)*e);if(t<1)requestAnimationFrame(tick);}tick();
}

function drawBell(iq){
  const cont=document.getElementById('bellCurve');if(!cont)return;
  const W=640,H=200,pad={t:18,r:25,b:52,l:25};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const xMin=40,xMax=160;
  const xS=v=>pad.l+(v-xMin)/(xMax-xMin)*gW;
  const yS=v=>pad.t+gH-v/normalPDF(100)*gH*0.88;
  let path='',shade=`M${xS(xMin)},${yS(0)} L`;
  const iqC=Math.max(xMin,Math.min(xMax,iq));
  for(let x=xMin;x<=xMax;x+=0.5){
    const y=normalPDF(x),px=xS(x),py=yS(y);
    path+=(x===xMin?'M':'L')+`${px},${py} `;
    if(x<=iqC)shade+=`${px},${py} `;
  }
  shade+=`L${xS(iqC)},${yS(0)} Z`;
  let areaPath=`M${xS(xMin)},${yS(0)} L`;
  for(let x=xMin;x<=xMax;x+=0.5)areaPath+=`${xS(x)},${yS(normalPDF(x))} `;
  areaPath+=`L${xS(xMax)},${yS(0)} Z`;
  const ux=xS(iqC),uy=yS(normalPDF(iqC));
  const marks=[55,70,85,100,115,130,145];const lbls=['-3σ','-2σ','-1σ','μ','+1σ','+2σ','+3σ'];
  let gl='',gt='';
  marks.forEach((v,i)=>{const x=xS(v);gl+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${H-pad.b}" stroke="rgba(255,255,255,.07)" stroke-dasharray="4,3"/>`;gt+=`<text x="${x}" y="${H-pad.b+15}" text-anchor="middle" fill="#64748b" font-size="10">${v}</text><text x="${x}" y="${H-pad.b+28}" text-anchor="middle" fill="#475569" font-size="9">${lbls[i]}</text>`;});
  cont.innerHTML=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
${gl}<path d="${areaPath}" fill="rgba(129,140,248,.07)"/><path d="${shade}" fill="rgba(129,140,248,.25)"/>
<path d="${path}" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linejoin="round"/>
<line x1="${ux}" y1="${uy}" x2="${ux}" y2="${H-pad.b}" stroke="#c084fc" stroke-width="2" stroke-dasharray="5,3"/>
<circle cx="${ux}" cy="${uy}" r="6" fill="#c084fc" stroke="#fff" stroke-width="2.5"/>
<rect x="${ux-28}" y="${uy-30}" width="56" height="24" rx="6" fill="#7c3aed"/>
<text x="${ux}" y="${uy-14}" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">${iq}</text>
${gt}</svg>`;
}

/* ===================== INIT ===================== */
zeigeLanding();
</script>
