
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Assessment Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#4f46e5;--pri2:#7c3aed;--bg:#0f172a;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--purple:#a855f7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.landing{text-align:center;max-width:700px;animation:fadeUp .6s ease}
.landing h1{font-size:2.8rem;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;font-weight:800;letter-spacing:-1px}
.landing .sub{color:#94a3b8;font-size:1.1rem;margin-bottom:40px}
.landing .desc{color:#cbd5e1;font-size:1rem;line-height:1.7;margin-bottom:36px;text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
.info-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px 16px}
.info-card .num{font-size:1.6rem;font-weight:700;color:#818cf8}
.info-card .lbl{color:#94a3b8;font-size:.85rem;margin-top:4px}
.cats{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:36px}
.cat-tag{background:rgba(129,140,248,.12);color:#a5b4fc;padding:8px 18px;border-radius:100px;font-size:.85rem;border:1px solid rgba(129,140,248,.2)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:16px 48px;border-radius:14px;border:none;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;box-shadow:0 4px 24px rgba(79,70,229,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,70,229,.45)}
.btn-secondary{background:rgba(255,255,255,.06);color:#cbd5e1;border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.test-container{width:100%;max-width:800px;animation:fadeUp .4s ease}
.progress-bar{background:rgba(255,255,255,.08);border-radius:100px;height:6px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));border-radius:100px;transition:width .4s ease}
.test-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-counter{color:#94a3b8;font-size:.9rem}
.q-cat{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.q-cat[data-cat="P"]{background:rgba(59,130,246,.15);color:#60a5fa}
.q-cat[data-cat="N"]{background:rgba(34,197,94,.15);color:#4ade80}
.q-cat[data-cat="L"]{background:rgba(249,115,22,.15);color:#fb923c}
.q-cat[data-cat="V"]{background:rgba(168,85,247,.15);color:#c084fc}
.q-cat[data-cat="S"]{background:rgba(236,72,153,.15);color:#f472b6}
.timer{color:#94a3b8;font-size:.85rem;font-variant-numeric:tabular-nums}
.q-card{background:var(--card);border-radius:20px;padding:36px;box-shadow:0 4px 40px rgba(0,0,0,.25);margin-bottom:20px}
.q-title{font-size:1.15rem;font-weight:600;margin-bottom:24px;color:var(--text);line-height:1.5}
.q-visual{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:28px;padding:20px;background:#f8fafc;border-radius:14px}
.q-visual .arrow{color:#94a3b8;font-size:1.5rem;margin:0 4px}
.cell{display:inline-flex;align-items:center;justify-content:center;flex-wrap:wrap;width:72px;height:72px;background:#fff;border:2px solid var(--border);border-radius:10px;gap:2px;padding:4px;transition:all .2s}
.cell-missing{border:2px dashed #cbd5e1;background:#f1f5f9;font-size:1.5rem;font-weight:700;color:#94a3b8}
.matrix-grid{display:inline-grid;gap:6px;margin-bottom:28px;padding:20px;background:#f8fafc;border-radius:14px}
.matrix-3{grid-template-columns:repeat(3,72px)}
.opts-grid{display:grid;gap:12px}
.opts-4{grid-template-columns:repeat(2,1fr)}
.opts-6{grid-template-columns:repeat(3,1fr)}
.opt-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;text-align:left;font-size:1rem;color:var(--text)}
.opt-btn:hover{border-color:#a5b4fc;background:#f5f3ff}
.opt-btn.selected{border-color:var(--pri);background:#eef2ff;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.opt-btn.correct{border-color:var(--green);background:#f0fdf4}
.opt-btn.wrong{border-color:var(--red);background:#fef2f2}
.opt-label{width:28px;height:28px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:var(--muted);flex-shrink:0}
.opt-btn.selected .opt-label{background:var(--pri);color:#fff}
.opt-content{flex:1;line-height:1.4}
.nav-row{display:flex;justify-content:flex-end;margin-top:16px}
.shape{line-height:1}
.results{text-align:center;max-width:750px;animation:fadeUp .6s ease}
.iq-display{margin-bottom:16px}
.iq-score{font-size:5rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.iq-label{color:#94a3b8;font-size:1rem;margin-top:4px}
.classification{font-size:1.3rem;font-weight:600;margin-bottom:4px}
.percentile{color:#94a3b8;font-size:.95rem;margin-bottom:32px}
.bell-curve-container{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:28px}
.bell-curve-container h3{color:#e2e8f0;font-size:1rem;margin-bottom:16px}
.cat-breakdown{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:28px;text-align:left}
.cat-breakdown h3{color:#e2e8f0;font-size:1rem;margin-bottom:18px;text-align:center}
.cat-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.cat-name{width:140px;color:#cbd5e1;font-size:.88rem;flex-shrink:0}
.cat-bar-bg{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:100px;transition:width 1s ease}
.cat-pct{width:42px;text-align:right;color:#94a3b8;font-size:.85rem;font-weight:600}
.details-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:28px}
.details-card h3{color:#e2e8f0;font-size:1rem;margin-bottom:14px;text-align:center}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.detail-item{text-align:center}
.detail-val{font-size:1.3rem;font-weight:700;color:#a5b4fc}
.detail-lbl{color:#94a3b8;font-size:.78rem;margin-top:2px}
.disclaimer{color:#64748b;font-size:.78rem;line-height:1.6;margin-top:20px;padding:16px;background:rgba(255,255,255,.02);border-radius:12px;border:1px solid rgba(255,255,255,.05)}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@media(max-width:600px){
  .landing h1{font-size:2rem}
  .info-grid{grid-template-columns:1fr}
  .q-card{padding:20px}
  .cell{width:56px;height:56px}
  .opts-4,.opts-6{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .iq-score{font-size:3.5rem}
  .matrix-3{grid-template-columns:repeat(3,56px)}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════ SHAPES & COLORS ═══════════════════
const SH={c:['●','○'],s:['■','□'],t:['▲','△'],d:['◆','◇'],st:['★','☆'],x:['✚','✚'],h:['⬡','⬡']};
const C={B:'#3b82f6',R:'#ef4444',G:'#22c55e',P:'#a855f7',O:'#f97316',T:'#14b8a6',PK:'#ec4899',Y:'#eab308'};
const CAT_NAMES={P:'Pattern Recognition',N:'Numerical Reasoning',L:'Logical Reasoning',V:'Verbal Reasoning',S:'Spatial Reasoning'};
const CAT_COLORS={P:'#3b82f6',N:'#22c55e',L:'#f97316',V:'#a855f7',S:'#ec4899'};

function sh(t,c=C.B,f=true,sz=34){return{t,c,f,sz};}

// ═══════════════════ QUESTIONS ═══════════════════
const QUESTIONS=[
// ── PATTERN RECOGNITION ──
{cat:'P',diff:1,type:'seq',title:'What shape comes next in the sequence?',
 seq:[[sh('c')],[sh('s')],[sh('t')],[sh('c')],[sh('s')]],
 opts:[[sh('s')],[sh('d')],[sh('t')],[sh('c')]],ans:2},

{cat:'P',diff:1,type:'seq',title:'What comes next in the sequence?',
 seq:[[sh('c',C.B,true,20)],[sh('c',C.B,true,20),sh('c',C.B,true,20)],[sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20)],[sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20)]],
 opts:[[sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20)],[sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20)],[sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20),sh('c',C.B,true,20)],[sh('c',C.B,true,20),sh('c',C.B,true,20)]],ans:1},

{cat:'P',diff:2,type:'seq',title:'Identify the two patterns and find the next element.',
 seq:[[sh('c',C.R)],[sh('c',C.B)],[sh('s',C.R)],[sh('s',C.B)],[sh('t',C.R)]],
 opts:[[sh('t',C.R)],[sh('c',C.B)],[sh('d',C.B)],[sh('t',C.B)]],ans:3},

{cat:'P',diff:3,type:'seq',title:'Observe size and shape patterns. What comes next?',
 seq:[[sh('c',C.B,true,22)],[sh('s',C.B,true,34)],[sh('t',C.B,true,46)],[sh('c',C.B,true,34)],[sh('s',C.B,true,22)]],
 opts:[[sh('t',C.B,true,22)],[sh('t',C.B,true,46)],[sh('s',C.B,true,34)],[sh('c',C.B,true,46)]],ans:1},

{cat:'P',diff:4,type:'matrix',title:'Each row and column contains each shape and color exactly once. Find the missing cell.',
 grid:[
  [[sh('c',C.R)],[sh('s',C.B)],[sh('t',C.G)]],
  [[sh('s',C.G)],[sh('t',C.R)],[sh('c',C.B)]],
  [[sh('t',C.B)],[sh('c',C.G)],null]
 ],
 opts:[[sh('s',C.R)],[sh('c',C.R)],[sh('t',C.R)],[sh('s',C.G)],[sh('d',C.R)],[sh('c',C.G)]],ans:0},

{cat:'P',diff:5,type:'matrix',title:'Find the rules for shape, color, size, and fill. What is the missing cell?',
 grid:[
  [[sh('c',C.R,true,22)],[sh('s',C.B,false,22)],[sh('t',C.G,true,22)]],
  [[sh('c',C.R,false,34)],[sh('s',C.B,true,34)],[sh('t',C.G,false,34)]],
  [[sh('c',C.R,true,46)],[sh('s',C.B,false,46)],null]
 ],
 opts:[[sh('t',C.G,false,46)],[sh('t',C.R,true,46)],[sh('t',C.G,true,46)],[sh('s',C.G,true,46)],[sh('t',C.B,true,46)],[sh('c',C.G,true,46)]],ans:2},

// ── NUMERICAL REASONING ──
{cat:'N',diff:1,type:'text',title:'What number comes next in the sequence?',
 q:'2, &nbsp; 4, &nbsp; 6, &nbsp; 8, &nbsp; __',
 opts:['9','10','12','14'],ans:1},

{cat:'N',diff:2,type:'text',title:'What number comes next?',
 q:'3, &nbsp; 6, &nbsp; 12, &nbsp; 24, &nbsp; __',
 opts:['30','36','48','96'],ans:2},

{cat:'N',diff:2,type:'text',title:'What number comes next in this famous sequence?',
 q:'1, &nbsp; 1, &nbsp; 2, &nbsp; 3, &nbsp; 5, &nbsp; 8, &nbsp; __',
 opts:['10','11','13','15'],ans:2},

{cat:'N',diff:3,type:'text',title:'What number comes next?',
 q:'2, &nbsp; 3, &nbsp; 5, &nbsp; 7, &nbsp; 11, &nbsp; __',
 opts:['12','13','14','15'],ans:1},

{cat:'N',diff:3,type:'text',title:'Each number follows the pattern n³. What comes next?',
 q:'1, &nbsp; 8, &nbsp; 27, &nbsp; 64, &nbsp; __',
 opts:['81','100','125','216'],ans:2},

{cat:'N',diff:4,type:'text',title:'What number comes next?',
 q:'1, &nbsp; 2, &nbsp; 6, &nbsp; 24, &nbsp; 120, &nbsp; __',
 opts:['240','360','600','720'],ans:3},

{cat:'N',diff:5,type:'text',title:'Each number is the sum of the three preceding numbers. What comes next?',
 q:'0, &nbsp; 1, &nbsp; 1, &nbsp; 2, &nbsp; 4, &nbsp; 7, &nbsp; 13, &nbsp; __',
 opts:['19','20','24','26'],ans:2},

// ── LOGICAL REASONING ──
{cat:'L',diff:1,type:'text',title:'Evaluate the following logical argument:',
 q:'All dogs are animals. All animals need water.<br><br><b>Conclusion:</b> All dogs need water.',
 opts:['Valid — the conclusion follows','Invalid — the conclusion does not follow','Cannot be determined','Only partially true'],ans:0},

{cat:'L',diff:2,type:'text',title:'Evaluate this reasoning:',
 q:'<em>"If it rains, the street gets wet."</em><br><br>Observation: The street is wet.<br><br>Can we conclude that it rained?',
 opts:['Yes, it must have rained','No — the street could be wet for other reasons','Only if there are no sprinklers','Yes, because the statement is biconditional'],ans:1},

{cat:'L',diff:2,type:'text',title:'Is this syllogism valid?',
 q:'Some cats are black.<br>Some black things are hats.<br><br><b>Conclusion:</b> Therefore, some cats are hats.',
 opts:['Valid','Invalid — undistributed middle','Valid only for some cats','Cannot be determined'],ans:1},

{cat:'L',diff:3,type:'text',title:'Determine the ordering:',
 q:'A is taller than B.<br>C is shorter than B.<br>D is taller than A.<br><br>Who is the <b>shortest</b>?',
 opts:['A','B','C','D'],ans:2},

{cat:'L',diff:3,type:'text',title:'Apply the rule to draw a conclusion:',
 q:'No student who passed the exam is lazy.<br>John is a student.<br>John is lazy.<br><br>What can we conclude?',
 opts:['John passed the exam','John did not pass the exam','John is not a student','Nothing can be concluded'],ans:1},

{cat:'L',diff:4,type:'text',title:'Only one statement is true. Where is the prize?',
 q:'Three boxes each have a statement:<br><br>📦 <b>Box A:</b> "The prize is in this box."<br>📦 <b>Box B:</b> "The prize is not in this box."<br>📦 <b>Box C:</b> "The prize is not in Box A."<br><br>Exactly <b>one</b> statement is true. Which box contains the prize?',
 opts:['Box A','Box B','Box C','Cannot be determined'],ans:1},

{cat:'L',diff:5,type:'text',title:'Use the clues to solve:',
 q:'Five people have different favorite colors:<br><br>1. Dave\'s favorite is Red<br>2. Eve\'s favorite is Purple<br>3. Alice\'s favorite is not Blue<br>4. Carol\'s favorite is not Yellow or Green<br>5. Bob\'s favorite is not Green<br><br>Remaining colors: Blue, Green, Yellow.<br>What is <b>Carol\'s</b> favorite color?',
 opts:['Blue','Green','Yellow','Cannot be determined'],ans:0},

// ── VERBAL REASONING ──
{cat:'V',diff:1,type:'text',title:'Complete the analogy:',
 q:'<b>Hot</b> is to <b>Cold</b> &nbsp; as &nbsp; <b>Day</b> is to __',
 opts:['Light','Night','Sun','Evening'],ans:1},

{cat:'V',diff:2,type:'text',title:'Complete the analogy:',
 q:'<b>Painter</b> is to <b>Brush</b> &nbsp; as &nbsp; <b>Writer</b> is to __',
 opts:['Book','Paper','Pen','Story'],ans:2},

{cat:'V',diff:3,type:'text',title:'Complete the analogy:',
 q:'<b>Archipelago</b> is to <b>Islands</b> &nbsp; as &nbsp; <b>Constellation</b> is to __',
 opts:['Sky','Planets','Stars','Galaxy'],ans:2},

{cat:'V',diff:4,type:'text',title:'Choose the word most similar in meaning to:',
 q:'<b>UBIQUITOUS</b>',
 opts:['Unique','Omnipresent','Ambiguous','Unanimous'],ans:1},

{cat:'V',diff:5,type:'text',title:'Which word does NOT belong with the others?',
 q:'All words except one share a common meaning. Identify the <b>outlier</b>.',
 opts:['Ephemeral','Transient','Perpetual','Fleeting'],ans:2},

// ── SPATIAL REASONING ──
{cat:'S',diff:1,type:'text',title:'Spatial orientation:',
 q:'You are facing <b>North</b>. You turn <b>90° to the right</b>.<br><br>Which direction are you now facing?',
 opts:['North','East','South','West'],ans:1},

{cat:'S',diff:2,type:'text',title:'Follow the rotations:',
 q:'You are facing <b>North</b>. You turn <b>180°</b>, then turn <b>90° to the left</b>.<br><br>Which direction are you now facing?',
 opts:['North','East','South','West'],ans:1},

{cat:'S',diff:3,type:'text',title:'Calculate the angle:',
 q:'A clock shows <b>3:15</b>. What is the angle between the hour hand and the minute hand?<br><br><em>Hint: The hour hand moves as minutes pass.</em>',
 opts:['0°','7.5°','15°','90°'],ans:1},

{cat:'S',diff:4,type:'text',title:'Count all possible squares:',
 q:'How many squares of <b>any size</b> can be found in a 4×4 grid?<br><br><em>(Count 1×1, 2×2, 3×3, and 4×4 squares.)</em>',
 opts:['16','20','25','30'],ans:3},

{cat:'S',diff:5,type:'text',title:'3D spatial reasoning:',
 q:'A cube is painted <b>red</b> on all faces, then cut into <b>27 smaller cubes</b> (3×3×3).<br><br>How many small cubes have <b>exactly 2</b> painted faces?',
 opts:['6','8','12','16'],ans:2},
];

// ═══════════════════ STATE ═══════════════════
const state={screen:'landing',qi:0,answers:[],times:[],selected:-1,tStart:0,qStart:0,totalTime:0};

// ═══════════════════ RENDERING ═══════════════════
function shapeSpan(s){
  const ch=SH[s.t];
  const char=s.f!==false?ch[0]:ch[1];
  return `<span class="shape" style="color:${s.c};font-size:${s.sz||34}px;line-height:1">${char}</span>`;
}

function cellDiv(shapes,size=72){
  if(!shapes) return `<div class="cell cell-missing" style="width:${size}px;height:${size}px">?</div>`;
  return `<div class="cell" style="width:${size}px;height:${size}px">${shapes.map(s=>shapeSpan(s)).join('')}</div>`;
}

function renderSequence(seq){
  let h='<div class="q-visual">';
  seq.forEach((cell,i)=>{
    h+=cellDiv(cell);
    if(i<seq.length-1) h+='';
  });
  h+='<span class="arrow">→</span>'+cellDiv(null);
  h+='</div>';
  return h;
}

function renderMatrix(grid){
  const rows=grid.length;
  let h=`<div class="q-visual"><div class="matrix-grid matrix-${rows}">`;
  grid.forEach(row=>{
    row.forEach(cell=>{h+=cellDiv(cell);});
  });
  h+='</div></div>';
  return h;
}

function renderOptions(q){
  const isVis=q.type!=='text';
  const n=q.opts.length;
  const cls=n<=4?'opts-4':'opts-6';
  const labels='ABCDEF'.split('');
  let h=`<div class="opts-grid ${cls}">`;
  q.opts.forEach((opt,i)=>{
    const sel=state.selected===i?' selected':'';
    const content=isVis?opt.map(s=>shapeSpan(s)).join(' '):opt;
    h+=`<button class="opt-btn${sel}" onclick="selectOpt(${i})">
      <span class="opt-label">${labels[i]}</span>
      <span class="opt-content">${content}</span>
    </button>`;
  });
  h+='</div>';
  return h;
}

// ═══════════════════ SCREENS ═══════════════════
const app=document.getElementById('app');

function showLanding(){
  state.screen='landing';
  app.innerHTML=`<div class="landing">
    <h1>🧠 IQ Assessment</h1>
    <p class="sub">Standardized Intelligence Quotient Estimation</p>
    <div class="desc">
      <p>This test estimates your IQ using question types from validated psychometric instruments including <b>Raven's Progressive Matrices</b>, <b>Wechsler Adult Intelligence Scale (WAIS)</b>, and <b>Stanford-Binet</b> paradigms.</p>
      <br><p>Your score is calculated using <b>Item Response Theory (IRT)</b> weighted scoring, mapped to the standard IQ scale (μ=100, σ=15) via probit transformation. Processing speed is factored in.</p>
    </div>
    <div class="info-grid">
      <div class="info-card"><div class="num">30</div><div class="lbl">Questions</div></div>
      <div class="info-card"><div class="num">~20</div><div class="lbl">Minutes</div></div>
      <div class="info-card"><div class="num">5</div><div class="lbl">Categories</div></div>
    </div>
    <div class="cats">
      <span class="cat-tag">🔷 Pattern Recognition</span>
      <span class="cat-tag">🔢 Numerical Reasoning</span>
      <span class="cat-tag">🧩 Logical Reasoning</span>
      <span class="cat-tag">📝 Verbal Reasoning</span>
      <span class="cat-tag">📐 Spatial Reasoning</span>
    </div>
    <button class="btn btn-primary" onclick="startTest()">Start Test →</button>
    <p style="color:#64748b;font-size:.8rem;margin-top:16px">No time limit per question. Take your time.</p>
  </div>`;
}

function startTest(){
  state.screen='test';state.qi=0;state.answers=[];state.times=[];state.selected=-1;
  state.tStart=Date.now();state.qStart=Date.now();
  showQuestion();
}

function showQuestion(){
  const q=QUESTIONS[state.qi];
  const pct=((state.qi)/QUESTIONS.length*100).toFixed(0);
  const elapsed=Math.floor((Date.now()-state.tStart)/1000);
  const mins=String(Math.floor(elapsed/60)).padStart(2,'0');
  const secs=String(elapsed%60).padStart(2,'0');

  let visual='';
  if(q.type==='seq') visual=renderSequence(q.seq);
  else if(q.type==='matrix') visual=renderMatrix(q.grid);

  app.innerHTML=`<div class="test-container">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="test-header">
      <span class="q-counter">Question ${state.qi+1} of ${QUESTIONS.length}</span>
      <span class="q-cat" data-cat="${q.cat}">${CAT_NAMES[q.cat]}</span>
      <span class="timer" id="timer">⏱ ${mins}:${secs}</span>
    </div>
    <div class="q-card">
      <div class="q-title">${q.title}${q.q?'<div style="margin-top:14px;padding:18px;background:#f8fafc;border-radius:12px;font-size:1.1rem;line-height:1.8">'+q.q+'</div>':''}</div>
      ${visual}
      ${renderOptions(q)}
    </div>
    <div class="nav-row">
      <button class="btn btn-primary" onclick="nextQ()" id="nextBtn" ${state.selected<0?'style="opacity:.4;pointer-events:none"':''}>
        ${state.qi===QUESTIONS.length-1?'Finish Test':'Next →'}
      </button>
    </div>
  </div>`;
  startTimer();
}

let timerInterval;
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const el=document.getElementById('timer');
    if(!el)return clearInterval(timerInterval);
    const elapsed=Math.floor((Date.now()-state.tStart)/1000);
    el.textContent=`⏱ ${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
  },1000);
}

window.selectOpt=function(i){
  state.selected=i;
  document.querySelectorAll('.opt-btn').forEach((b,j)=>{
    b.className='opt-btn'+(j===i?' selected':'');
  });
  const nb=document.getElementById('nextBtn');
  if(nb){nb.style.opacity='1';nb.style.pointerEvents='auto';}
};

window.nextQ=function(){
  if(state.selected<0)return;
  state.answers.push(state.selected);
  state.times.push((Date.now()-state.qStart)/1000);
  state.selected=-1;
  state.qi++;
  if(state.qi>=QUESTIONS.length){
    state.totalTime=(Date.now()-state.tStart)/1000;
    clearInterval(timerInterval);
    showResults();
  }else{
    state.qStart=Date.now();
    showQuestion();
  }
};

// ═══════════════════ SCORING (IRT-based) ═══════════════════
function probit(p){
  // Rational approximation of inverse normal CDF (Peter Acklam)
  const a1=-3.969683028665376e1,a2=2.209460984245205e2,a3=-2.759285104469687e2,
    a4=1.383577518672690e2,a5=-3.066479806614716e1,a6=2.506628277459239e0;
  const b1=-5.447609879822406e1,b2=1.615858368580409e2,b3=-1.556989798598866e2,
    b4=6.680131188771972e1,b5=-1.328068155288572e1;
  const c1=-7.784894002430293e-3,c2=-3.223964580411365e-1,c3=-2.400758277161838e0,
    c4=-2.549732539343734e0,c5=4.374664141464968e0,c6=2.938163982698783e0;
  const d1=7.784695709041462e-3,d2=3.224671290700398e-1,d3=2.445134137142996e0,
    d4=3.754408661907416e0;
  const pL=0.02425,pH=1-pL;
  let q,r;
  if(p<pL){q=Math.sqrt(-2*Math.log(p));return(((((c1*q+c2)*q+c3)*q+c4)*q+c5)*q+c6)/(((( d1*q+d2)*q+d3)*q+d4)*q+1);}
  else if(p<=pH){q=p-0.5;r=q*q;return(((((a1*r+a2)*r+a3)*r+a4)*r+a5)*r+a6)*q/(((((b1*r+b2)*r+b3)*r+b4)*r+b5)*r+1);}
  else{q=Math.sqrt(-2*Math.log(1-p));return-(((((c1*q+c2)*q+c3)*q+c4)*q+c5)*q+c6)/((((d1*q+d2)*q+d3)*q+d4)*q+1);}
}

function normalPDF(x,mu=0,sigma=1){
  const z=(x-mu)/sigma;
  return Math.exp(-0.5*z*z)/(sigma*Math.sqrt(2*Math.PI));
}

function calculateResults(){
  let weightedScore=0,maxWeighted=0;
  const catScores={P:{got:0,max:0},N:{got:0,max:0},L:{got:0,max:0},V:{got:0,max:0},S:{got:0,max:0}};
  let correctCount=0;

  QUESTIONS.forEach((q,i)=>{
    const w=q.diff;
    maxWeighted+=w;
    catScores[q.cat].max+=w;
    if(state.answers[i]===q.ans){
      weightedScore+=w;
      catScores[q.cat].got+=w;
      correctCount++;
    }
  });

  const rawPct=weightedScore/maxWeighted;
  const clamped=Math.max(0.01,Math.min(0.99,rawPct));

  // Calibration: shift so that ~38% weighted score maps to IQ 100
  const SHIFT=0.30;
  const SCALE=1.3;
  const z=(probit(clamped)+SHIFT)*SCALE;
  let iq=Math.round(100+15*z);

  // Processing speed adjustment (-3 to +3)
  const avgTime=state.times.reduce((a,b)=>a+b,0)/state.times.length;
  const speedAdj=Math.max(-3,Math.min(3,(25-avgTime)/8));
  iq=Math.round(iq+speedAdj);
  iq=Math.max(55,Math.min(160,iq));

  // Percentile from z-score
  const finalZ=(iq-100)/15;
  const percentile=Math.min(99.9,Math.max(0.1,(0.5*(1+erf(finalZ/Math.sqrt(2))))*100));

  // Classification
  let classification,classColor;
  if(iq<70){classification='Extremely Low';classColor='#ef4444';}
  else if(iq<80){classification='Borderline';classColor='#f97316';}
  else if(iq<90){classification='Low Average';classColor='#eab308';}
  else if(iq<110){classification='Average';classColor='#22c55e';}
  else if(iq<120){classification='High Average';classColor='#3b82f6';}
  else if(iq<130){classification='Superior';classColor='#6366f1';}
  else if(iq<145){classification='Very Superior';classColor='#8b5cf6';}
  else{classification='Exceptional';classColor='#d946ef';}

  return{iq,percentile:percentile.toFixed(1),classification,classColor,correctCount,
    rawPct:(rawPct*100).toFixed(1),catScores,avgTime:avgTime.toFixed(1),
    totalTime:state.totalTime,speedAdj:speedAdj.toFixed(1),weightedScore,maxWeighted};
}

function erf(x){
  const t=1/(1+0.3275911*Math.abs(x));
  const poly=t*(0.254829592+t*(-0.284496736+t*(1.421413741+t*(-1.453152027+t*1.061405429))));
  const result=1-poly*Math.exp(-x*x);
  return x>=0?result:-result;
}

// ═══════════════════ RESULTS ═══════════════════
function showResults(){
  const r=calculateResults();
  const totalMins=Math.floor(r.totalTime/60);
  const totalSecs=Math.floor(r.totalTime%60);

  let catBars='';
  Object.entries(r.catScores).forEach(([cat,sc])=>{
    const pct=sc.max>0?Math.round(sc.got/sc.max*100):0;
    catBars+=`<div class="cat-row">
      <span class="cat-name">${CAT_NAMES[cat]}</span>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${CAT_COLORS[cat]}"></div></div>
      <span class="cat-pct">${pct}%</span>
    </div>`;
  });

  app.innerHTML=`<div class="results">
    <div class="iq-display">
      <div class="iq-score" id="iqNum">0</div>
      <div class="iq-label">Estimated IQ Score</div>
    </div>
    <div class="classification" style="color:${r.classColor}">${r.classification}</div>
    <div class="percentile">Percentile: ${r.percentile}% — You scored higher than ${r.percentile}% of the population</div>

    <div class="bell-curve-container">
      <h3>Normal Distribution — Your Position</h3>
      <div id="bellCurve"></div>
    </div>

    <div class="cat-breakdown">
      <h3>Category Breakdown</h3>
      ${catBars}
    </div>

    <div class="details-card">
      <h3>Test Statistics</h3>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-val">${r.correctCount}/${QUESTIONS.length}</div><div class="detail-lbl">Correct Answers</div></div>
        <div class="detail-item"><div class="detail-val">${r.rawPct}%</div><div class="detail-lbl">Weighted Score</div></div>
        <div class="detail-item"><div class="detail-val">${totalMins}:${String(totalSecs).padStart(2,'0')}</div><div class="detail-lbl">Total Time</div></div>
        <div class="detail-item"><div class="detail-val">${r.avgTime}s</div><div class="detail-lbl">Avg. Time / Question</div></div>
        <div class="detail-item"><div class="detail-val">${r.speedAdj>0?'+':''}${r.speedAdj}</div><div class="detail-lbl">Speed Adjustment</div></div>
        <div class="detail-item"><div class="detail-val">${r.weightedScore}/${r.maxWeighted}</div><div class="detail-lbl">Weighted Points</div></div>
      </div>
    </div>

    <div class="disclaimer">
      <b>Disclaimer:</b> This is an estimation tool, not a clinically administered IQ test. Official IQ testing (WAIS-IV, Stanford-Binet 5, Raven's APM) requires a licensed psychologist and controlled conditions. Results may vary ±5-10 points from a clinical assessment. This test uses Item Response Theory weighted scoring with probit normalization calibrated to the Wechsler scale (μ=100, σ=15).
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="startTest()">Retake Test</button>
      <button class="btn btn-secondary" onclick="showLanding()">Back to Home</button>
    </div>
  </div>`;

  // Animate IQ counter
  animateCounter(r.iq);
  // Draw bell curve
  setTimeout(()=>drawBellCurve(r.iq),300);
}

function animateCounter(target){
  const el=document.getElementById('iqNum');
  const duration=1500;
  const start=Date.now();
  const from=60;
  function tick(){
    const t=Math.min(1,(Date.now()-start)/duration);
    const ease=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+(target-from)*ease);
    if(t<1)requestAnimationFrame(tick);
  }
  tick();
}

function drawBellCurve(iq){
  const container=document.getElementById('bellCurve');
  if(!container)return;
  const W=680,H=220,pad={t:20,r:30,b:50,l:30};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;

  const xMin=40,xMax=160;
  function xScale(v){return pad.l+(v-xMin)/(xMax-xMin)*gW;}
  function yScale(v){return pad.t+gH-v/(normalPDF(100,100,15))*gH*0.9;}

  // Build curve path
  let path='M';
  let areaPath='M'+xScale(xMin)+','+yScale(0)+' L';
  for(let x=xMin;x<=xMax;x+=0.5){
    const y=normalPDF(x,100,15);
    const px=xScale(x),py=yScale(y);
    path+=`${px},${py} `;
    areaPath+=`${px},${py} `;
  }
  areaPath+=`L${xScale(xMax)},${yScale(0)} Z`;

  // Shaded area up to user's IQ
  let shadePath='M'+xScale(xMin)+','+yScale(0)+' L';
  const iqClamped=Math.max(xMin,Math.min(xMax,iq));
  for(let x=xMin;x<=iqClamped;x+=0.5){
    const y=normalPDF(x,100,15);
    shadePath+=`${xScale(x)},${yScale(y)} `;
  }
  shadePath+=`L${xScale(iqClamped)},${yScale(0)} Z`;

  // User marker
  const ux=xScale(iqClamped);
  const uy=yScale(normalPDF(iqClamped,100,15));

  // SD lines and labels
  const sdMarks=[55,70,85,100,115,130,145];
  const sdLabels=['-3σ','-2σ','-1σ','μ','+1σ','+2σ','+3σ'];
  let gridLines='',gridLabels='';
  sdMarks.forEach((v,i)=>{
    const x=xScale(v);
    gridLines+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${H-pad.b}" stroke="rgba(255,255,255,.08)" stroke-dasharray="4,4"/>`;
    gridLabels+=`<text x="${x}" y="${H-pad.b+16}" text-anchor="middle" fill="#64748b" font-size="11">${v}</text>`;
    gridLabels+=`<text x="${x}" y="${H-pad.b+30}" text-anchor="middle" fill="#475569" font-size="9">${sdLabels[i]}</text>`;
  });

  const svg=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${gridLines}
    <path d="${areaPath}" fill="rgba(129,140,248,.08)" stroke="none"/>
    <path d="${shadePath}" fill="rgba(129,140,248,.2)" stroke="none"/>
    <path d="${path}" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="${ux}" y1="${uy}" x2="${ux}" y2="${H-pad.b}" stroke="#c084fc" stroke-width="2" stroke-dasharray="6,3"/>
    <circle cx="${ux}" cy="${uy}" r="6" fill="#c084fc" stroke="#fff" stroke-width="2"/>
    <rect x="${ux-24}" y="${uy-28}" width="48" height="22" rx="6" fill="#7c3aed"/>
    <text x="${ux}" y="${uy-14}" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">${iq}</text>
    ${gridLabels}
  </svg>`;
  container.innerHTML=svg;
}

// ═══════════════════ INIT ═══════════════════
showLanding();
</script>
